<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Para May - Galaxia de Amor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
            background: #1a0a0a;
            width: 100vw;
            height: 100vh;
            user-select: none;
        }
        #splash {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #ffe0e8 0%, #ffdab9 100%);
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }
        #splash.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        #splash h1 {
            font-size: clamp(2.2rem, 10vw, 4.5rem);
            font-weight: 300;
            letter-spacing: 2px;
            color: #a0526b;
            text-shadow: 0 6px 20px rgba(255, 150, 180, 0.3);
            margin-bottom: 2rem;
            text-align: center;
            padding: 0 1rem;
        }
        #btnAbrir {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.8rem;
            padding: 1.2rem 2.8rem;
            border-radius: 60px;
            background: #ff8da1;
            color: #fff;
            font-weight: 600;
            letter-spacing: 1.5px;
            box-shadow: 0 0 30px #ff8da1aa, 0 0 60px #ff6b81aa;
            transition: 0.3s;
            animation: latidoBoton 1.8s infinite ease-in-out;
        }
        #btnAbrir:hover { transform: scale(1.05); background: #ff6b81; }
        @keyframes latidoBoton {
            0% { box-shadow: 0 0 20px #ff8da1aa; transform: scale(1); }
            50% { box-shadow: 0 0 50px #ff6b81ee, 0 0 80px #ff85a2aa; transform: scale(1.04); }
            100% { box-shadow: 0 0 20px #ff8da1aa; transform: scale(1); }
        }

        #loadingScreen {
            position: fixed;
            inset: 0;
            z-index: 999;
            background: #0f0510;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #ffe0e8;
            transition: opacity 0.6s;
        }
        #loadingScreen.active { display: flex; }
        #loadingScreen .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(2px 2px at 20px 30px, #eee, transparent),
                        radial-gradient(2px 2px at 40px 70px, #fff, transparent),
                        radial-gradient(2px 2px at 50px 160px, #ddd, transparent),
                        radial-gradient(2px 2px at 90px 40px, #fff, transparent),
                        radial-gradient(2px 2px at 130px 80px, #fff, transparent);
            background-size: 200px 200px;
            opacity: 0.3;
            animation: caerEstrellas 4s linear infinite;
        }
        @keyframes caerEstrellas {
            from { transform: translateY(-10%); }
            to { transform: translateY(10%); }
        }
        .loader-content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
        }
        #heartLoader {
            width: 100px;
            height: 100px;
            position: relative;
            cursor: pointer;
        }
        #heartLoader canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        #progressCircle {
            width: 140px;
            height: 140px;
            position: relative;
        }
        #progressCircle svg {
            transform: rotate(-90deg);
            width: 140px;
            height: 140px;
        }
        #progressCircle circle {
            fill: none;
            stroke-width: 6;
            stroke-linecap: round;
        }
        .bg-circle { stroke: #3a1a2a; }
        .progress-circle {
            stroke: #ff8da1;
            stroke-dasharray: 380;
            stroke-dashoffset: 380;
            transition: stroke-dashoffset 0.1s linear;
            filter: drop-shadow(0 0 8px #ff6b81);
        }
        .chispas {
            position: absolute;
            inset: -20px;
            pointer-events: none;
            background: radial-gradient(circle, #ffb6c1 2px, transparent 3px);
            background-size: 25px 25px;
            opacity: 0.4;
            animation: girarChispas 8s linear infinite;
        }
        @keyframes girarChispas {
            from { transform: rotate(0); }
            to { transform: rotate(360deg); }
        }
        #loadingText {
            font-size: 1.1rem;
            letter-spacing: 4px;
            color: #ffb6c1;
            font-weight: 300;
        }

        #galaxyCanvas {
            position: fixed;
            inset: 0;
            z-index: 1;
            display: none;
        }
        #galaxyCanvas.active { display: block; }

        /* MENSAJE CENTRAL - HTML PURO (SIN LAG) */
        #mensajeCentral {
            position: fixed;
            z-index: 35;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
            max-width: 90vw;
            line-height: 1.3;
            animation: brilloMensaje 2s ease-in-out infinite alternate;
            display: none;
        }
        #mensajeCentral .linea1 {
            font-size: clamp(2rem, 5vw, 3.8rem);
            font-weight: 800;
            color: #FFB6C1;
            text-shadow: 0 0 30px #ff6b81, 0 0 60px #ff85a2, 0 0 90px #ffb6c1;
            display: block;
            letter-spacing: 2px;
        }
        #mensajeCentral .linea2 {
            font-size: clamp(1.6rem, 4vw, 3rem);
            font-weight: 700;
            color: #FFD1DC;
            text-shadow: 0 0 30px #ff6b81, 0 0 60px #ff85a2;
            display: block;
            margin-top: 0.2rem;
            letter-spacing: 1px;
        }
        #mensajeCentral .linea3 {
            font-size: clamp(1.2rem, 3vw, 2.2rem);
            font-weight: 600;
            color: #FFDAB9;
            text-shadow: 0 0 30px #ff85a2, 0 0 50px #ff6b81;
            display: block;
            margin-top: 0.2rem;
        }
        #mensajeCentral .linea4 {
            font-size: clamp(2rem, 4.5vw, 3.2rem);
            font-weight: 800;
            color: #FF6B81;
            text-shadow: 0 0 40px #ff6b81, 0 0 80px #ff85a2, 0 0 120px #ffb6c1;
            display: block;
            margin-top: 0.3rem;
            letter-spacing: 2px;
        }
        @keyframes brilloMensaje {
            0% { filter: brightness(1) drop-shadow(0 0 20px #ff6b81); }
            100% { filter: brightness(1.2) drop-shadow(0 0 40px #ff85a2); }
        }

        /* LLUVIA DE CORAZONES Y FRASES */
        .lluvia-item {
            position: fixed;
            z-index: 20;
            pointer-events: none;
            font-size: 1.5rem;
            animation: caerLluvia linear forwards;
            opacity: 0.9;
            text-shadow: 0 0 20px rgba(255, 107, 129, 0.5);
        }
        @keyframes caerLluvia {
            0% {
                transform: translateY(-100px) rotate(0deg) scale(0.5);
                opacity: 0;
            }
            10% {
                opacity: 0.9;
                transform: translateY(0px) rotate(10deg) scale(1);
            }
            90% {
                opacity: 0.9;
            }
            100% {
                transform: translateY(110vh) rotate(720deg) scale(0.3);
                opacity: 0;
            }
        }

        #musicPlayer {
            position: fixed;
            bottom: 25px;
            right: 25px;
            z-index: 100;
            background: rgba(30, 10, 20, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #fff;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
            border: 1px solid #ffb6c155;
            transition: 0.3s;
            min-width: 200px;
            flex-wrap: wrap;
            justify-content: center;
        }
        #musicPlayer.minimizado {
            min-width: 50px;
            border-radius: 40px;
            padding: 6px 12px;
        }
        #musicPlayer.minimizado .controles,
        #musicPlayer.minimizado .info-cancion,
        #musicPlayer.minimizado .volumen-slider,
        #musicPlayer.minimizado .barra-progreso {
            display: none;
        }
        .player-btn {
            background: none;
            border: none;
            color: #ffb6c1;
            font-size: 1.5rem;
            cursor: pointer;
            transition: 0.2s;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 50%;
        }
        .player-btn:hover { background: #ffb6c133; color: #ff8da1; }
        .info-cancion { font-size: 0.8rem; color: #ffd1dc; white-space: nowrap; max-width: 120px; overflow: hidden; text-overflow: ellipsis; }
        .barra-progreso {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            min-width: 100px;
        }
        .barra-progreso input[type="range"] {
            width: 100%;
            height: 4px;
            -webkit-appearance: none;
            background: #3a1a2a;
            border-radius: 4px;
            outline: none;
        }
        .barra-progreso input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff8da1;
            cursor: pointer;
            box-shadow: 0 0 10px #ff6b81;
        }
        .tiempo { font-size: 0.7rem; color: #ffb6c1; min-width: 36px; }
        .volumen-slider {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .volumen-slider input[type="range"] {
            width: 50px;
            height: 4px;
            -webkit-appearance: none;
            background: #3a1a2a;
            border-radius: 4px;
        }
        .volumen-slider input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff8da1;
            cursor: pointer;
        }
        .toggle-min {
            background: none;
            border: none;
            color: #ffb6c1;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0 4px;
        }
        .lista-canciones {
            background: rgba(20, 10, 15, 0.9);
            backdrop-filter: blur(8px);
            border-radius: 16px;
            padding: 8px;
            position: absolute;
            bottom: 70px;
            right: 0;
            display: none;
            flex-direction: column;
            gap: 4px;
            border: 1px solid #ffb6c155;
            min-width: 150px;
        }
        .lista-canciones.active { display: flex; }
        .lista-canciones button {
            background: none;
            border: none;
            color: #ffd1dc;
            padding: 6px 12px;
            text-align: left;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.2s;
            font-size: 0.85rem;
        }
        .lista-canciones button:hover { background: #ffb6c122; color: #fff; }

        .mensaje-emergente {
            position: fixed;
            z-index: 200;
            background: rgba(255, 240, 245, 0.95);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 28px 32px;
            max-width: 340px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            border: 1px solid #ffb6c188;
            color: #3a1a2a;
            font-size: 1rem;
            line-height: 1.6;
            animation: aparecerCarta 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: auto;
        }
        @keyframes aparecerCarta {
            from { opacity: 0; transform: scale(0.7) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .mensaje-emergente .cerrar {
            position: absolute;
            top: 8px;
            right: 14px;
            background: none;
            border: none;
            font-size: 1.4rem;
            color: #a0526b;
            cursor: pointer;
        }

        .palabra-clave {
            position: fixed;
            z-index: 50;
            color: #ffd1dc;
            font-size: 1.2rem;
            font-weight: 500;
            text-shadow: 0 0 20px #ff85a2, 0 0 40px #ff6b81;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(4px);
            padding: 6px 16px;
            border-radius: 40px;
            border: 1px solid #ffb6c177;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 1px;
            pointer-events: auto;
        }
        .palabra-clave:hover {
            transform: scale(1.1);
            background: rgba(255, 200, 210, 0.2);
            border-color: #ff8da1;
            box-shadow: 0 0 30px #ff6b8166;
        }

        @media (max-width: 600px) {
            #musicPlayer { bottom: 12px; right: 12px; padding: 6px 10px; min-width: 150px; gap: 6px; }
            .player-btn { font-size: 1.2rem; width: 30px; height: 30px; }
            .info-cancion { max-width: 70px; font-size: 0.7rem; }
            .barra-progreso input[type="range"] { width: 60px; }
            .volumen-slider input[type="range"] { width: 30px; }
            .mensaje-emergente { max-width: 260px; padding: 20px; font-size: 0.9rem; }
            #btnAbrir { font-size: 1.2rem; padding: 0.8rem 1.8rem; }
            #mensajeCentral .linea1 { font-size: clamp(1.4rem, 4.5vw, 2.2rem); }
            #mensajeCentral .linea2 { font-size: clamp(1.2rem, 3.5vw, 1.8rem); }
            #mensajeCentral .linea3 { font-size: clamp(0.9rem, 2.5vw, 1.3rem); }
            #mensajeCentral .linea4 { font-size: clamp(1.4rem, 4vw, 2rem); }
        }
    </style>
</head>
<body>

<div id="splash">
    <h1 id="tituloSplash">Para May, con todo mi amor</h1>
    <button id="btnAbrir">❤️ Abrir regalo</button>
</div>

<div id="loadingScreen">
    <div class="stars"></div>
    <div class="loader-content">
        <div id="heartLoader">
            <canvas id="loaderCanvas" width="100" height="100"></canvas>
        </div>
        <div id="progressCircle">
            <svg viewBox="0 0 140 140">
                <circle class="bg-circle" cx="70" cy="70" r="60" />
                <circle class="progress-circle" id="progressCircleFill" cx="70" cy="70" r="60" />
            </svg>
            <div class="chispas"></div>
        </div>
        <div id="loadingText">Cargando galaxia...</div>
    </div>
</div>

<div id="galaxyCanvas"></div>

<!-- MENSAJE CENTRAL - HTML PURO -->
<div id="mensajeCentral">
    <span class="linea1">♥︎ Te AMO mushísimo ♥︎</span>
    <span class="linea2">mi bella niñita siempre PERFECTA</span>
    <span class="linea3">de todito mi korashon</span>
    <span class="linea4">HEHE (≧▽≦)/ ♥︎</span>
</div>

<div id="musicPlayer">
    <button class="toggle-min" id="toggleMinimizar">◀</button>
    <span class="info-cancion" id="nombreCancion">🎵 Sin canción</span>
    <button class="player-btn" id="btnPlayPause">▶</button>
    <button class="player-btn" id="btnRetroceder">⏪</button>
    <button class="player-btn" id="btnAdelantar">⏩</button>
    <div class="barra-progreso">
        <span class="tiempo" id="tiempoActual">0:00</span>
        <input type="range" id="progressBar" min="0" max="1" step="0.001" value="0" />
        <span class="tiempo" id="tiempoTotal">0:00</span>
    </div>
    <div class="volumen-slider">
        <span>🔊</span>
        <input type="range" id="volumenControl" min="0" max="1" step="0.05" value="0.7" />
    </div>
    <button class="player-btn" id="btnLista">📋</button>
    <div class="lista-canciones" id="listaCanciones"></div>
</div>

<script>
    // ================================================================
    //  CONFIGURACIÓN CENTRALIZADA (CON LLUVIA)
    // ================================================================
    const CONFIG = {
        nombre: "May",
        frases: [
            "Eres mi universo, May",
            "Cada latido es por ti",
            "May, mi corazón baila contigo",
            "Eres la luz de mi galaxia",
            "Contigo, eternidad"
        ],
        mensajesLargos: {
            "Eres mi universo, May": "May, desde que llegaste a mi vida, cada estrella brilla con tu nombre. Eres el centro de todo mi cosmos.",
            "Cada latido es por ti": "Cada latido de mi corazón tiene tu nombre, May. Late por ti, late para ti, late contigo.",
            "May, mi corazón baila contigo": "Cuando estoy contigo, mi corazón baila al ritmo de tu sonrisa. Eres mi melodía favorita.",
            "Eres la luz de mi galaxia": "Tu luz ilumina incluso los rincones más oscuros de mi ser. Gracias por existir, May.",
            "Contigo, eternidad": "Contigo, el tiempo se detiene y la eternidad se vuelve un instante. Te amo, May."
        },
        palabrasClave: {
            "Recuerdos": "Nuestro primer viaje juntos, tus risas, tus abrazos y cada momento que compartimos. Atesoro cada segundo.",
            "Promesas": "Te prometo amarte siempre, en las buenas y en las malas, hoy y por toda la eternidad.",
            "Futuro": "Imagino un futuro lleno de días soleados contigo, May. Nuestras historias, nuestros sueños... todo juntos.",
            "Eternidad": "El amor que siento por ti trasciende el tiempo. Eres mi eternidad, mi todo.",
            "Aventura": "Cada día a tu lado es una nueva aventura llena de magia, descubrimientos y amor incondicional."
        },
        colores: ["#FFB6C1", "#FF6B81", "#FFD1DC", "#FFDAB9", "#FF85A2"],
        canciones: ["cancion1.mp3", "cancion2.mp3", "cancion3.mp3"],
        imagenes: ["foto1.jpg", "foto2.jpg", "foto3.jpg", "foto4.jpg"],
        velocidadOrbita: 0.002,
        cantidadParticulas: 3500,
        duracionCarga: 2.5,
        frasesLluvia: [
            "Te amo May 💖",
            "Eres mi sol ✨",
            "Siempre tú 🌸",
            "Mi alma 💫",
            "Eres perfecta 🌹",
            "Te adoro ❤️",
            "Eres mi vida 💕",
            "Mi razón de ser 🌺"
        ]
    };

    // ================================================================
    //  VARIABLES GLOBALES
    // ================================================================
    let scene, camera, renderer;
    let particulas = [];
    let frasesObjetos = [];
    let palabrasClaveObjetos = [];
    let imagenesOrbitando = [];
    let mouse = new THREE.Vector2(0, 0);
    let tiempo = 0;
    let audio = new Audio();
    let isPlaying = false;
    let cancionesLista = [];
    let imagenTextures = [];
    let lluviaActiva = true;
    let intervaloLluvia = null;

    // ================================================================
    //  FUNCIONES DE INICIO Y CARGA
    // ================================================================
    function iniciar() {
        document.getElementById('btnAbrir').addEventListener('click', () => {
            document.getElementById('splash').classList.add('hidden');
            mostrarCarga();
        });
        configurarReproductor();
    }

    function mostrarCarga() {
        const loading = document.getElementById('loadingScreen');
        loading.classList.add('active');
        const canvas = document.getElementById('loaderCanvas');
        const ctx = canvas.getContext('2d');
        let progreso = 0;
        const duracion = CONFIG.duracionCarga * 1000;
        const inicio = Date.now();
        let acelerado = false;

        function dibujarCorazon(prog) {
            ctx.clearRect(0, 0, 100, 100);
            const cx = 50, cy = 50;
            const total = 300;
            const filled = Math.floor(prog * total);
            const colores = CONFIG.colores;
            for (let i = 0; i < total; i++) {
                const t = i / total;
                const ang = t * Math.PI * 2;
                const x = 16 * Math.pow(Math.sin(ang), 3);
                const y = 13 * Math.cos(ang) - 5 * Math.cos(2*ang) - 2 * Math.cos(3*ang) - Math.cos(4*ang);
                const px = cx + x * 2.2;
                const py = cy - y * 2.2;
                const size = (i < filled) ? 2.5 : 1.2;
                const color = colores[i % colores.length];
                ctx.beginPath();
                ctx.arc(px, py, size, 0, Math.PI * 2);
                ctx.fillStyle = (i < filled) ? color : '#3a1a2a';
                ctx.shadowColor = (i < filled) ? '#ff8da1' : 'transparent';
                ctx.shadowBlur = (i < filled) ? 8 : 0;
                ctx.fill();
            }
            if (prog > 0.2) {
                const pulso = 1 + Math.sin(Date.now() / 300) * 0.03 * (prog);
                ctx.save();
                ctx.translate(50, 50);
                ctx.scale(pulso, pulso);
                ctx.translate(-50, -50);
                ctx.restore();
            }
        }

        function actualizarCarga() {
            const ahora = Date.now();
            const elapsed = ahora - inicio;
            let prog = Math.min(elapsed / duracion, 1);
            if (acelerado) prog = Math.min(prog + 0.03, 1);

            const circle = document.getElementById('progressCircleFill');
            const offset = 380 - (380 * prog);
            circle.style.strokeDashoffset = offset;

            dibujarCorazon(prog);

            document.getElementById('loadingText').textContent = 
                prog < 1 ? `Cargando galaxia... ${Math.round(prog*100)}%` : '¡Listo! 💫';

            if (prog < 1) {
                requestAnimationFrame(actualizarCarga);
            } else {
                setTimeout(() => {
                    loading.style.opacity = '0';
                    setTimeout(() => {
                        loading.classList.remove('active');
                        iniciarGalaxia();
                    }, 600);
                }, 300);
            }
        }

        document.getElementById('heartLoader').addEventListener('click', () => {
            acelerado = true;
        });

        actualizarCarga();
    }

    // ================================================================
    //  INICIALIZAR GALAXIA
    // ================================================================
    function iniciarGalaxia() {
        document.getElementById('mensajeCentral').style.display = 'block';

        const container = document.getElementById('galaxyCanvas');
        container.classList.add('active');

        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0f0510);

        const aspect = window.innerWidth / window.innerHeight;
        camera = new THREE.PerspectiveCamera(60, aspect, 0.1, 1000);
        camera.position.set(0, 2, 12);
        camera.lookAt(0, 0, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        cargarTexturas();
        crearCorazonParticulas();
        crearFrases();
        crearPalabrasClave();
        crearImagenes();
        efectoNacimiento();
        iniciarLluvia();

        window.addEventListener('resize', onResize);
        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('click', onGalaxyClick);

        animar();
    }

    // ================================================================
    //  CORAZÓN DE PARTÍCULAS
    // ================================================================
    function crearCorazonParticulas() {
        const geometria = new THREE.BufferGeometry();
        const count = CONFIG.cantidadParticulas;
        const posiciones = new Float32Array(count * 3);
        const colores = new Float32Array(count * 3);
        const coloresPaleta = CONFIG.colores.map(c => new THREE.Color(c));

        for (let i = 0; i < count; i++) {
            const t = Math.random() * Math.PI * 2;
            const rFactor = 0.5 + 0.5 * Math.random();
            const x = 16 * Math.pow(Math.sin(t), 3) * rFactor * 0.7;
            const y = (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * rFactor * 0.7;
            const z = (Math.random() - 0.5) * 1.2;

            posiciones[i*3] = x;
            posiciones[i*3+1] = y;
            posiciones[i*3+2] = z;

            const color = coloresPaleta[Math.floor(Math.random() * coloresPaleta.length)];
            colores[i*3] = color.r;
            colores[i*3+1] = color.g;
            colores[i*3+2] = color.b;
        }

        geometria.setAttribute('position', new THREE.BufferAttribute(posiciones, 3));
        geometria.setAttribute('color', new THREE.BufferAttribute(colores, 3));

        const material = new THREE.PointsMaterial({
            size: 0.08,
            vertexColors: true,
            transparent: true,
            opacity: 0.9,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            sizeAttenuation: true
        });

        const puntos = new THREE.Points(geometria, material);
        puntos.name = 'corazonCentral';
        scene.add(puntos);

        particulas.push({
            mesh: puntos,
            geometria: geometria,
            material: material,
            escala: 1,
            velocidadOrbita: CONFIG.velocidadOrbita,
            posicionesOriginales: posiciones.slice()
        });
    }

    // ================================================================
    //  FRASES ORBITANDO
    // ================================================================
    function crearFrases() {
        const frases = CONFIG.frases;
        const radio = 4.5;
        frases.forEach((texto, idx) => {
            const angulo = (idx / frases.length) * Math.PI * 2;
            const div = document.createElement('div');
            div.textContent = texto;
            div.style.position = 'fixed';
            div.style.color = '#ffd1dc';
            div.style.fontSize = '1.1rem';
            div.style.fontWeight = '500';
            div.style.textShadow = '0 0 20px #ff85a2, 0 0 40px #ff6b81';
            div.style.cursor = 'pointer';
            div.style.background = 'rgba(20, 10, 15, 0.4)';
            div.style.backdropFilter = 'blur(6px)';
            div.style.padding = '8px 18px';
            div.style.borderRadius = '40px';
            div.style.border = '1px solid #ffb6c155';
            div.style.transition = '0.2s';
            div.style.pointerEvents = 'auto';
            div.style.zIndex = '40';
            div.style.letterSpacing = '0.5px';
            div.style.whiteSpace = 'nowrap';
            document.body.appendChild(div);

            div.addEventListener('click', (e) => {
                e.stopPropagation();
                const mensaje = CONFIG.mensajesLargos[texto] || 'Te amo, May 💖';
                mostrarMensajeEmergente(mensaje, e.clientX, e.clientY);
            });

            frasesObjetos.push({
                elemento: div,
                angulo: angulo,
                radio: radio,
                velocidad: 0.003 + Math.random() * 0.002
            });
        });
    }

    // ================================================================
    //  PALABRAS CLAVE
    // ================================================================
    function crearPalabrasClave() {
        const palabras = Object.keys(CONFIG.palabrasClave);
        const posiciones = [
            { x: -5.5, y: 2.0 },
            { x: 5.5, y: 2.0 },
            { x: -5.0, y: -2.5 },
            { x: 5.0, y: -2.5 },
            { x: 0, y: -4.0 }
        ];
        palabras.forEach((palabra, idx) => {
            const div = document.createElement('div');
            div.textContent = palabra;
            div.className = 'palabra-clave';
            const pos = posiciones[idx % posiciones.length];
            div.dataset.x = pos.x;
            div.dataset.y = pos.y;
            div.style.position = 'fixed';
            div.style.zIndex = '50';
            document.body.appendChild(div);

            div.addEventListener('click', (e) => {
                e.stopPropagation();
                const mensaje = CONFIG.palabrasClave[palabra] || '💖';
                mostrarMensajeEmergente(mensaje, e.clientX, e.clientY);
            });

            palabrasClaveObjetos.push({
                elemento: div,
                x: pos.x,
                y: pos.y
            });
        });
    }

    // ================================================================
    //  IMÁGENES ORBITANDO
    // ================================================================
    function cargarTexturas() {
        const imagenes = CONFIG.imagenes;
        const loader = new THREE.TextureLoader();
        imagenes.forEach((img) => {
            loader.load(
                'img/' + img,
                (texture) => {
                    imagenTextures.push(texture);
                    if (imagenTextures.length === imagenes.length) {
                        crearImagenes();
                    }
                },
                undefined,
                () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 128; canvas.height = 128;
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = '#ffb6c1';
                    ctx.fillRect(0, 0, 128, 128);
                    ctx.fillStyle = '#fff';
                    ctx.font = '30px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('💖', 64, 64);
                    const tex = new THREE.CanvasTexture(canvas);
                    imagenTextures.push(tex);
                }
            );
        });
    }

    function crearImagenes() {
        if (imagenTextures.length === 0) {
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ffb6c1';
            ctx.fillRect(0, 0, 128, 128);
            ctx.fillStyle = '#fff';
            ctx.font = '30px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('📸', 64, 64);
            const tex = new THREE.CanvasTexture(canvas);
            imagenTextures = [tex, tex, tex, tex];
        }

        const radios = [4.8, 5.6, 4.0, 5.2];
        const sizes = [1.2, 1.0, 1.4, 0.9];
        CONFIG.imagenes.forEach((_, idx) => {
            const tex = imagenTextures[idx % imagenTextures.length];
            const geometria = new THREE.PlaneGeometry(sizes[idx], sizes[idx]);
            const material = new THREE.MeshBasicMaterial({
                map: tex,
                transparent: true,
                side: THREE.DoubleSide
            });
            const mesh = new THREE.Mesh(geometria, material);
            const angulo = (idx / CONFIG.imagenes.length) * Math.PI * 2 + Math.random() * 0.5;
            const radio = radios[idx % radios.length];
            mesh.position.set(
                Math.cos(angulo) * radio,
                Math.sin(angulo) * radio * 0.7,
                Math.sin(angulo * 0.5) * 1.5
            );
            mesh.name = 'imagenOrbita';
            mesh.userData = {
                angulo: angulo,
                radio: radio,
                velocidad: 0.002 + Math.random() * 0.002
            };
            scene.add(mesh);

            const bordeGeo = new THREE.PlaneGeometry(sizes[idx] + 0.15, sizes[idx] + 0.15);
            const bordeMat = new THREE.MeshBasicMaterial({
                color: 0xff8da1,
                transparent: true,
                opacity: 0.3,
                side: THREE.DoubleSide
            });
            const borde = new THREE.Mesh(bordeGeo, bordeMat);
            borde.position.copy(mesh.position);
            borde.position.z += 0.01;
            scene.add(borde);

            imagenesOrbitando.push({
                mesh: mesh,
                borde: borde,
                angulo: angulo,
                radio: radio,
                velocidad: 0.002 + Math.random() * 0.002
            });
        });
    }

    // ================================================================
    //  LLUVIA DE CORAZONES Y FRASES (RESTAURADA)
    // ================================================================
    function iniciarLluvia() {
        const emojis = ['❤️', '💖', '💕', '💗', '💝', '✨', '🌸', '🌹', '💫', '🌺'];
        const frases = CONFIG.frasesLluvia;
        
        // Limpiar intervalo anterior si existe
        if (intervaloLluvia) clearInterval(intervaloLluvia);
        
        intervaloLluvia = setInterval(() => {
            if (!lluviaActiva) return;
            
            const cantidad = 2 + Math.floor(Math.random() * 3);
            for (let i = 0; i < cantidad; i++) {
                const esFrase = Math.random() > 0.5;
                const contenido = esFrase ? 
                    frases[Math.floor(Math.random() * frases.length)] : 
                    emojis[Math.floor(Math.random() * emojis.length)];
                
                const div = document.createElement('div');
                div.className = 'lluvia-item';
                div.textContent = contenido;
                div.style.left = (Math.random() * 90 + 5) + '%';
                div.style.fontSize = (1.2 + Math.random() * 1.5) + 'rem';
                div.style.animationDuration = (6 + Math.random() * 6) + 's';
                div.style.color = CONFIG.colores[Math.floor(Math.random() * CONFIG.colores.length)];
                div.style.textShadow = `0 0 30px ${CONFIG.colores[Math.floor(Math.random() * CONFIG.colores.length)]}`;
                
                document.body.appendChild(div);
                
                setTimeout(() => {
                    if (div.parentNode) div.remove();
                }, 12000);
            }
        }, 800);
    }

    // ================================================================
    //  EFECTO NACIMIENTO DE ESTRELLAS
    // ================================================================
    function efectoNacimiento() {
        const count = 300;
        const geometria = new THREE.BufferGeometry();
        const pos = new Float32Array(count * 3);
        const col = new Float32Array(count * 3);
        for (let i = 0; i < count; i++) {
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            const r = 0.1 + Math.random() * 0.5;
            pos[i*3] = Math.sin(phi) * Math.cos(theta) * r;
            pos[i*3+1] = Math.sin(phi) * Math.sin(theta) * r;
            pos[i*3+2] = Math.cos(phi) * r;
            const c = new THREE.Color(CONFIG.colores[Math.floor(Math.random() * CONFIG.colores.length)]);
            col[i*3] = c.r;
            col[i*3+1] = c.g;
            col[i*3+2] = c.b;
        }
        geometria.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        geometria.setAttribute('color', new THREE.BufferAttribute(col, 3));
        const material = new THREE.PointsMaterial({
            size: 0.12,
            vertexColors: true,
            transparent: true,
            opacity: 1,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });
        const puntos = new THREE.Points(geometria, material);
        scene.add(puntos);

        let startTime = Date.now();
        const duracion = 1500;

        function expandir() {
            const elapsed = Date.now() - startTime;
            const prog = Math.min(elapsed / duracion, 1);
            const positions = geometria.attributes.position.array;
            for (let i = 0; i < count; i++) {
                const idx = i * 3;
                const x = positions[idx];
                const y = positions[idx+1];
                const z = positions[idx+2];
                const dist = Math.sqrt(x*x + y*y + z*z);
                if (dist > 0.01) {
                    const factor = 1 + prog * 8;
                    positions[idx] = x * factor;
                    positions[idx+1] = y * factor;
                    positions[idx+2] = z * factor;
                }
            }
            geometria.attributes.position.needsUpdate = true;
            material.opacity = 1 - prog;
            if (prog < 1) {
                requestAnimationFrame(expandir);
            } else {
                scene.remove(puntos);
                geometria.dispose();
                material.dispose();
            }
        }
        expandir();
    }

    // ================================================================
    //  MENSAJES EMERGENTES
    // ================================================================
    function mostrarMensajeEmergente(texto, x, y) {
        document.querySelectorAll('.mensaje-emergente').forEach(el => el.remove());

        const div = document.createElement('div');
        div.className = 'mensaje-emergente';
        div.textContent = texto;
        div.style.left = Math.min(x + 20, window.innerWidth - 360) + 'px';
        div.style.top = Math.min(y - 40, window.innerHeight - 200) + 'px';
        if (x + 360 > window.innerWidth) {
            div.style.left = (x - 340) + 'px';
        }
        if (y + 200 > window.innerHeight) {
            div.style.top = (y - 180) + 'px';
        }

        const cerrar = document.createElement('button');
        cerrar.className = 'cerrar';
        cerrar.textContent = '✕';
        cerrar.addEventListener('click', () => div.remove());
        div.appendChild(cerrar);

        document.body.appendChild(div);

        setTimeout(() => {
            if (div.parentNode) div.remove();
        }, 8000);
    }

    // ================================================================
    //  REPRODUCTOR DE MÚSICA
    // ================================================================
    function configurarReproductor() {
        const btnPlay = document.getElementById('btnPlayPause');
        const btnRetro = document.getElementById('btnRetroceder');
        const btnAdel = document.getElementById('btnAdelantar');
        const progress = document.getElementById('progressBar');
        const tiempoAct = document.getElementById('tiempoActual');
        const tiempoTot = document.getElementById('tiempoTotal');
        const volControl = document.getElementById('volumenControl');
        const btnLista = document.getElementById('btnLista');
        const listaContainer = document.getElementById('listaCanciones');
        const nombreCancion = document.getElementById('nombreCancion');
        const toggleMin = document.getElementById('toggleMinimizar');
        const player = document.getElementById('musicPlayer');

        cancionesLista = CONFIG.canciones.map((c, i) => ({
            nombre: c.replace('.mp3', '').replace(/_/g, ' '),
            archivo: 'music/' + c,
            index: i
        }));

        cancionesLista.forEach((cancion) => {
            const btn = document.createElement('button');
            btn.textContent = cancion.nombre;
            btn.addEventListener('click', () => {
                reproducirCancion(cancion.index);
                listaContainer.classList.remove('active');
            });
            listaContainer.appendChild(btn);
        });

        if (cancionesLista.length > 0) {
            audio.src = cancionesLista[0].archivo;
            audio.load();
            nombreCancion.textContent = '🎵 ' + cancionesLista[0].nombre;
        }

        btnPlay.addEventListener('click', () => {
            if (audio.src) {
                if (isPlaying) {
                    audio.pause();
                    btnPlay.textContent = '▶';
                } else {
                    audio.play().catch(() => {});
                    btnPlay.textContent = '⏸';
                }
                isPlaying = !isPlaying;
            }
        });

        btnRetro.addEventListener('click', () => {
            audio.currentTime = Math.max(0, audio.currentTime - 10);
        });

        btnAdel.addEventListener('click', () => {
            audio.currentTime = Math.min(audio.duration, audio.currentTime + 10);
        });

        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                const pct = audio.currentTime / audio.duration;
                progress.value = pct;
                tiempoAct.textContent = formatTime(audio.currentTime);
                tiempoTot.textContent = formatTime(audio.duration);
            }
        });

        progress.addEventListener('input', () => {
            if (audio.duration) {
                audio.currentTime = parseFloat(progress.value) * audio.duration;
            }
        });

        volControl.addEventListener('input', () => {
            audio.volume = parseFloat(volControl.value);
        });
        audio.volume = 0.7;

        btnLista.addEventListener('click', (e) => {
            e.stopPropagation();
            listaContainer.classList.toggle('active');
        });
        document.addEventListener('click', () => {
            listaContainer.classList.remove('active');
        });

        toggleMin.addEventListener('click', () => {
            player.classList.toggle('minimizado');
            toggleMin.textContent = player.classList.contains('minimizado') ? '▶' : '◀';
        });

        audio.addEventListener('ended', () => {
            const currentIndex = cancionesLista.findIndex(c => c.archivo === audio.src);
            if (currentIndex < cancionesLista.length - 1) {
                reproducirCancion(currentIndex + 1);
            } else {
                mostrarMensajeEmergente('May, esta canción termina, pero nuestro amor no 💖', 
                    window.innerWidth/2 - 150, window.innerHeight/2 - 50);
                btnPlay.textContent = '▶';
                isPlaying = false;
                audio.currentTime = 0;
                progress.value = 0;
                tiempoAct.textContent = '0:00';
            }
        });

        function reproducirCancion(index) {
            const cancion = cancionesLista[index];
            if (!cancion) return;
            audio.src = cancion.archivo;
            audio.load();
            audio.play().catch(() => {});
            isPlaying = true;
            btnPlay.textContent = '⏸';
            nombreCancion.textContent = '🎵 ' + cancion.nombre;
            document.querySelectorAll('#listaCanciones button').forEach((btn, i) => {
                btn.style.background = i === index ? '#ffb6c133' : '';
            });
        }

        window.reproducirCancion = reproducirCancion;
    }

    function formatTime(seconds) {
        if (!seconds || isNaN(seconds)) return '0:00';
        const m = Math.floor(seconds / 60);
        const s = Math.floor(seconds % 60);
        return m + ':' + (s < 10 ? '0' : '') + s;
    }

    // ================================================================
    //  EVENTOS DE INTERACCIÓN
    // ================================================================
    function onResize() {
        if (!renderer) return;
        const w = window.innerWidth;
        const h = window.innerHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
    }

    function onMouseMove(event) {
        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    }

    function onGalaxyClick(event) {
        const target = event.target;
        if (target.closest('#musicPlayer') || target.closest('.mensaje-emergente') || 
            target.closest('.palabra-clave') || target.closest('#mensajeCentral')) {
            return;
        }

        const emojis = ['💖', '✨', '🌸', '🌹', '💫', '🌺', '❤️‍🔥', '💕'];
        const frases = ['Te amo May', 'Eres mi sol', 'Siempre tú', 'Mi alma', 'Eres perfecta'];
        const count = 25 + Math.floor(Math.random() * 15);

        for (let i = 0; i < count; i++) {
            const emoji = emojis[Math.floor(Math.random() * emojis.length)];
            const div = document.createElement('div');
            div.textContent = Math.random() > 0.6 ? frases[Math.floor(Math.random() * frases.length)] : emoji;
            div.style.position = 'fixed';
            div.style.left = event.clientX + 'px';
            div.style.top = event.clientY + 'px';
            div.style.fontSize = (1 + Math.random() * 2) + 'rem';
            div.style.pointerEvents = 'none';
            div.style.zIndex = '300';
            div.style.transition = 'all 2s ease-out';
            div.style.opacity = '1';
            div.style.transform = 'translate(0, 0) scale(1)';
            div.style.textShadow = '0 0 30px #ff85a2, 0 0 60px #ff6b81';
            document.body.appendChild(div);

            const ang = Math.random() * Math.PI * 2;
            const dist = 80 + Math.random() * 200;
            const dx = Math.cos(ang) * dist;
            const dy = Math.sin(ang) * dist - 50;

            requestAnimationFrame(() => {
                div.style.transform = `translate(${dx}px, ${dy}px) scale(0.2)`;
                div.style.opacity = '0';
            });

            setTimeout(() => {
                if (div.parentNode) div.remove();
            }, 2200);
        }
    }

    // ================================================================
    //  ANIMACIÓN PRINCIPAL
    // ================================================================
    function animar() {
        requestAnimationFrame(animar);
        tiempo += 0.01;

        // 1. Corazón de partículas: latido y orbitación
        const corazon = particulas[0];
        if (corazon) {
            const pulso = 1 + Math.sin(tiempo * 2.5) * 0.04;
            corazon.mesh.scale.set(pulso, pulso, pulso);
            
            const colores = CONFIG.colores.map(c => new THREE.Color(c));
            const idx1 = Math.floor(tiempo * 0.2) % colores.length;
            const idx2 = (idx1 + 1) % colores.length;
            const mix = (tiempo * 0.2) % 1;
            const color = colores[idx1].clone().lerp(colores[idx2], mix);
            corazon.material.color = color;
            
            const positions = corazon.geometria.attributes.position.array;
            const angVel = CONFIG.velocidadOrbita;
            for (let i = 0; i < positions.length; i += 3) {
                const x = positions[i];
                const z = positions[i+2];
                if (Math.abs(x) > 0.01 || Math.abs(z) > 0.01) {
                    const dist = Math.sqrt(x*x + z*z);
                    const ang = Math.atan2(z, x) + angVel * 0.5;
                    positions[i] = Math.cos(ang) * dist;
                    positions[i+2] = Math.sin(ang) * dist;
                }
            }
            corazon.geometria.attributes.position.needsUpdate = true;
        }

        // 2. Frases orbitando
        frasesObjetos.forEach((f) => {
            f.angulo += f.velocidad;
            const x = Math.cos(f.angulo) * f.radio;
            const y = Math.sin(f.angulo) * f.radio * 0.8;
            const vector = new THREE.Vector3(x, y, 0);
            vector.project(camera);
            const px = (vector.x * 0.5 + 0.5) * window.innerWidth;
            const py = (-vector.y * 0.5 + 0.5) * window.innerHeight;
            f.elemento.style.transform = `translate(${px - f.elemento.offsetWidth/2}px, ${py - f.elemento.offsetHeight/2}px)`;
            f.elemento.style.opacity = vector.z < 1 ? '1' : '0';
        });

        // 3. Palabras clave
        palabrasClaveObjetos.forEach((p) => {
            const vector = new THREE.Vector3(p.x, p.y, 0);
            vector.project(camera);
            const px = (vector.x * 0.5 + 0.5) * window.innerWidth;
            const py = (-vector.y * 0.5 + 0.5) * window.innerHeight;
            p.elemento.style.transform = `translate(${px - p.elemento.offsetWidth/2}px, ${py - p.elemento.offsetHeight/2}px)`;
            p.elemento.style.opacity = vector.z < 1 ? '1' : '0';
        });

        // 4. Imágenes orbitando
        imagenesOrbitando.forEach((img) => {
            img.angulo += img.velocidad;
            const x = Math.cos(img.angulo) * img.radio;
            const y = Math.sin(img.angulo) * img.radio * 0.7;
            const z = Math.sin(img.angulo * 0.7) * 1.2;
            img.mesh.position.set(x, y, z);
            img.borde.position.set(x, y, z + 0.01);
            img.mesh.lookAt(0, 0, 0);
            img.borde.lookAt(0, 0, 0);
            img.borde.material.opacity = 0.2 + Math.sin(tiempo * 2 + img.angulo) * 0.1;
        });

        // 5. Efecto de viento (solo si hay partículas)
        if (particulas.length > 0) {
            const pos = particulas[0].geometria.attributes.position.array;
            const targetX = mouse.x * 0.3;
            const targetY = mouse.y * 0.3;
            for (let i = 0; i < pos.length; i += 3) {
                pos[i] += (pos[i] + targetX * 0.05 - pos[i]) * 0.02;
                pos[i+1] += (pos[i+1] + targetY * 0.05 - pos[i+1]) * 0.02;
            }
            particulas[0].geometria.attributes.position.needsUpdate = true;
        }

        renderer.render(scene, camera);
    }

    // ================================================================
    //  INICIO
    // ================================================================
    window.addEventListener('DOMContentLoaded', iniciar);
</script>
